<div class="flex flex-col gap-6 p-6">
    <h1 class="font-neo-medium text-xl text-primary">
        <!--TODO: add breadcrumb component-->
        {{ 'NAVIGATION.HOME' | translate }}
    </h1>
    <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
        <app-card [style]="CardStyle.CHART">
            <div header class="flex items-center justify-between">
                <h2 class="font-neo-regular text-xl text-primary">
                    {{ 'EVENTS.EVENTS_TYPE' | translate }}
                </h2>
            </div>
            <div body>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">
                    <app-pie-chart [data]="entertainmentChart()" [type]="PieChartType.SUMMARY"
                        [title]="'EVENTS.EVENT_CATEGORY_ENTERTAINMENT' | translate"
                        [bottomTitle]="entertainmentChart()[0]?.value?.toString() ?? ''" [total]="total()">
                    </app-pie-chart>
                    <app-pie-chart [data]="workChart()" [type]="PieChartType.SUMMARY"
                        [title]="'EVENTS.EVENT_CATEGORY_WORK' | translate"
                        [bottomTitle]="workChart()[0]?.value?.toString() ?? ''" [total]="total()">
                    </app-pie-chart>
                    <app-pie-chart [data]="educationChart()" [type]="PieChartType.SUMMARY"
                        [title]="'EVENTS.EVENT_CATEGORY_EDUCATION' | translate"
                        [bottomTitle]="educationChart()[0]?.value?.toString() ?? ''" [total]="total()">
                    </app-pie-chart>
                    <app-pie-chart [data]="otherChart()" [type]="PieChartType.SUMMARY"
                        [title]="'EVENTS.EVENT_CATEGORY_OTHER' | translate"
                        [bottomTitle]="otherChart()[0]?.value?.toString() ?? ''" [total]="total()">
                    </app-pie-chart>
                </div>
            </div>
        </app-card>
        <app-card [style]="CardStyle.CHART">
            <div header class="flex items-center justify-between">
                <h2 class="font-neo-regular text-xl text-primary">
                    {{ 'EVENTS.EVENTS_CATEGORY' | translate }}
                </h2>
            </div>
            <div body>
                <app-pie-chart [data]="eventTypes()" [type]="PieChartType.LEGEND">
                </app-pie-chart>
            </div>
        </app-card>
        <app-card [style]="CardStyle.CHART">
            <div header class="font-neo-regular text-lg text-primary">
                {{ 'EVENTS.TOTAL_EVENTS' | translate }}
            </div>
            <div body>
               <app-events-stacked-bar-chart
                [data]="monthlyEventsData()"
                [config]="eventsChartConfig">
                </app-events-stacked-bar-chart>
            </div>
        </app-card>
        <app-card [style]="CardStyle.CHART">
            <div header class="flex items-center justify-between">
                <h2 class="font-neo-regular text-xl text-primary">
                    {{ 'EVENTS.TOTAL_ATTENDEES' | translate }}
                </h2>
            </div>
            <div>
                <app-grouped-bar
                 [data]="monthlyAttendanceData()"
                 [config]="attendanceChartConfig">
                </app-grouped-bar>
            </div>
        </app-card>
    </div>
</div>
