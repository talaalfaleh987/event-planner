<div class="min-h-screen px-8 py-16 sm:px-20 sm:py-16 bg-main-gradient">
    <app-translate-button [style]="ButtonStyle.WHITE_ICON" />
    <app-card [hasBorder]="false">
        <div class="flex flex-col sm:flex-row max-w-5xl mx-auto gap-8 justify-between items-center">
            <div class="flex flex-1 w-full sm:w-1/3 sm:m-12 justify-start">
                <img src="assets/imgs/text-logo.svg" alt="logo" class="w-full" />
            </div>
            <div class="flex flex-col w-full m-12 sm:w-2/5 sm:m-16 items-end">
                <section id="form-header" class="w-full max-w-sm">
                    <div class="text-center mb-4">
                        <h1 class="text-1xl sm:text-2xl font-neo-medium">
                            {{ 'WELCOME_MESSAGE' | translate }}
                        </h1>
                    </div>
                    <div body>
                        <form [formGroup]="userForm" class="flex flex-col w-full">
                            <div class="min-h-9 m-2">
                             @if (userForm.invalid) {
                            <app-message [textMessage]="'INVALID_CREDENTIALS' | translate">
                                 <img src="assets/imgs/error.svg" alt="error" class="w-6 h-6 mx-2" />
                            </app-message>
                             }</div>
                            <app-input [label]="'USERNAME' | translate" [control]="usernameControl">
                            </app-input>
                            <app-input [label]="'PASSWORD' | translate" [control]="passwordControl">
                            </app-input>
                            <div class="mt-4">
                                <app-custom-button [buttonType]="ButtonType.SUBMIT">
                                    {{ 'LOGIN' | translate }}
                                </app-custom-button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </app-card>
</div>
