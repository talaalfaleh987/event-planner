<app-custom-button (click)="toggleLanguage()" [style]="style()">
    {{ 'SWITCH_LANGUGE' | translate }}
   @if (style() === ButtonStyle.WHITE_ICON) {
    <img src="assets/imgs/language-white.svg" class="w-6 h-6" alt="language" />
  } @else {
    <img src="assets/imgs/language-primary.svg" class="w-6 h-6" alt="language" />
  }
</app-custom-button>
