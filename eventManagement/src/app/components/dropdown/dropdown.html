<div
  class="dropdown w-full"
  appDropdownToggle
  #dropdownToggle="appDropdownToggle"
  [class.dropdown-open]="dropdownToggle.isOpen()"
>
  <div class="w-full cursor-pointer" (click)="dropdownToggle.toggle()">
    <app-input
      [controlName]="controlName()"
      [label]="label()"
      [errors]="errors()"
      [maxLength]="maxLength()"
      [showRequiredStar]="showRequiredStar()"
      [isReadonly]="true"
      [displayValue]="displayText"
    >
      <img
        v-tail
        src="assets/imgs/arrow.svg"
        alt="arrow"
        class="transition-transform duration-200"
        [class.rotate-180]="dropdownToggle.isOpen()"
      />
    </app-input>
  </div>
  @if (dropdownToggle.isOpen()) {
    <ul
      class="dropdown-content z-[1] mt-0 p-2 max-h-60 w-full overflow-auto rounded-md border border-grey-light bg-white shadow-md"
    >
      @for (option of options(); track option.value) {
        <li
          class="hover:bg-primary-normal/10 p-2 rounded-md cursor-pointer"
          (click)="selectOption(option); dropdownToggle.close()"
        >
          <a class="font-neo-regular text-primary">
            {{ getOptionLabel(option) }}
          </a>
        </li>
      }
    </ul>
  }
</div>
