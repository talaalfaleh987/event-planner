@if (items().length) {
  <nav class="text-sm text-primary-normal flex gap-1">
   @for (item of items(); track item.label; let i = $index; let last = $last) {
      <span
        [class.underline]="i === 0"
        class="cursor-pointer"
      >
        {{ item.label | translate }}
      </span>
      @if (!last) {
        <span class="text-primary-normal">&gt;</span>
      }
    }
  </nav>
}
