<div class="m-10 mb-0">
  @if (breadcrumbs$ | async; as items) {
  @if (items.length) {
  <nav class="font-neo-regular text-primary-normal flex gap-1">
    @for (item of items; track item.label; let last = $last) {
    <span [class.underline]="!last" class="cursor-pointer">
      {{ item.label | translate }}
    </span>
    @if (!last) {
    <span class="text-primary-normal">&gt;</span>
    }
    }
  </nav>
  }
  }
</div>
